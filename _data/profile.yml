short_bio: >-
  <p>
    Wei Shi is currently a staff AI researcher at Meituan M17. Prior to that, he received his Ph.D. <i>Magna Cum Laude</i> in December 2020 from
    <a href="http://www.uni-saarland.de/" target="_blank">Saarland University</a> in Germany,
    where he worked on Natural Language Processing under the supervision of
    <a href="https://www.uni-saarland.de/lehrstuhl/demberg/members/team.html" target="_blank">Prof. Dr. Vera Demberg</a>
    at the <a href="http://www.uni-saarland.de/en/department/lst.html" target="_blank">Department of Language Science and Technology</a>
    and Collaborative Research Center <a href="http://www.sfb1102.uni-saarland.de/" target="_blank">SFB-1102</a>.
  </p>
  <p>
    After graduation, he joined DAMO Academy, Alibaba Group as a Senior Algorithm Engineer in 2021,
    and later MiniMax Inc. in 2022, focusing on Large Language Models and Multimodal AI.
  </p>
  <p>
    His research interests include <b>Large Language Models</b>, <b>Multimodal AI</b>,
    <b>Discourse Relation Parsing</b>, <b>Sentiment Analysis</b>, <b>Text Generation</b>,
    and <b>Natural Language Understanding</b>.
  </p>

